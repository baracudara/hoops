syntax = "proto3"; 

package auth;

option go_package = "github.com/baracudara/hoops/protos/gen/go/auth;auth";

service Auth {
    rpc Register (RegisterRequest) returns (RegisterResponse); 
    rpc Login (LoginRequest) returns (LoginResponse); 
    rpc Logout (LogoutRequest) returns (LogoutResponse);
    rpc GuestLogin (GuestLoginRequest) returns (GuestLoginResponse); 
    rpc SendOTP(SendOTPRequest) returns (SendOTPResponse);
    rpc VerifyAccessToken(VerifyAccessTokenRequest) returns (VerifyAccessTokenResponse);
    rpc VerifyRefreshToken(VerifyRefreshTokenRequest) returns (VerifyRefreshTokenResponse);

}


message RegisterRequest {
    oneof auth_method {
        Email email = 1;
        Phone phone = 2; 
        string google_id = 3;
    }
    string name = 4;
    string nickname = 5;
}

message RegisterResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LoginRequest {
    oneof auth_method {
        Email email = 1;
        Phone phone = 2; 
        string google_id = 3;
    }
    int32 app_id = 5;

}

message LoginResponse {
    string access_token = 1;
    string refresh_token = 2;
}

message LogoutRequest {
    string token = 1;
}

message LogoutResponse {
    bool success = 1;
}

message GuestLoginRequest {
    string name = 1;
}

message GuestLoginResponse {
    string token = 1;
}


message SendOTPRequest {
  string phone = 1;
}

message SendOTPResponse {
  bool is_sent = 1;
}


message VerifyAccessTokenRequest {
    string access_token = 1;
}
message VerifyAccessTokenResponse {
    string uuid = 1;
    string role = 2;
    bool valid = 3;
}

message VerifyRefreshTokenRequest {
    string refresh_token = 1;
}

message VerifyRefreshTokenResponse {
    bool valid = 1;
}

message Email { 
    string email = 1; 
    string password = 2;
}

message Phone { 
    string phone = 1; 
    string otp_code = 2;
}

